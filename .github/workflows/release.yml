name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: jelper-macos
          - os: windows-latest
            artifact: jelper-windows-installer.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller requests rich keyring

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --name jelper-macos \
            --hidden-import keyring.backends.macOS \
            --hidden-import keyring.backends.fail \
            --icon jelper.ico \
            jelper.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --name jelper-windows `
            --hidden-import keyring.backends.Windows `
            --hidden-import keyring.backends.fail `
            --icon jelper.ico `
            jelper.py

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          iscc /DAppVersion=$version installer.iss

      - name: Upload (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: jelper-macos
          path: dist/jelper-macos

      - name: Upload (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: jelper-windows-installer.exe
          path: Output/jelper-windows-installer.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v7
        with:
          name: jelper-macos
          path: dist

      - uses: actions/download-artifact@v7
        with:
          name: jelper-windows-installer.exe
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            dist/jelper-macos
            dist/jelper-windows-installer.exe
          generate_release_notes: true
