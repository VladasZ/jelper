name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: jelper-macos
          - os: windows-latest
            artifact: jelper-installer.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller requests rich keyring

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --name jelper-macos \
            --hidden-import keyring.backends.macOS \
            --hidden-import keyring.backends.fail \
            --icon jelper.ico \
            jelper.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --name jelper-windows `
            --hidden-import keyring.backends.Windows `
            --hidden-import keyring.backends.fail `
            --icon jelper.ico `
            jelper.py

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          iscc /DAppVersion=$version installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/jelper-macos
            Output/jelper-installer.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
