name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: jelper-macos
          - os: windows-latest
            artifact: jelper-windows-installer.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller requests rich keyring keyrings.alt

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Inject version into script
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: python3 scripts/inject_version.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: bash scripts/build_macos.sh

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: scripts/build_windows.ps1

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: scripts/build_installer_windows.ps1 -Version "${{ steps.version.outputs.VERSION }}"

      - name: Upload (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: jelper-macos
          path: dist/jelper-macos

      - name: Upload (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: jelper-windows-installer.exe
          path: Output/jelper-windows-installer.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: jelper-macos
          path: dist

      - uses: actions/download-artifact@v7
        with:
          name: jelper-windows-installer.exe
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            dist/jelper-macos
            dist/jelper-windows-installer.exe
          generate_release_notes: true

      - name: Update Homebrew formula
        run: bash scripts/update_homebrew.sh "${{ github.ref_name }}" dist/jelper-macos "${{ secrets.HOMEBREW_TAP_KEY }}"
