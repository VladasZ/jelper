name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: jelper-macos
          - os: windows-latest
            artifact: jelper-windows-installer.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller requests rich keyring keyrings.alt

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Inject version into script
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: python3 -c "content = open('jelper.py', encoding='utf-8').read().replace('__JELPER_VERSION__', '$VERSION'); open('jelper.py', 'w', encoding='utf-8').write(content)"

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --name jelper-macos \
            --hidden-import keyring.backends.macOS \
            --hidden-import keyring.backends.fail \
            --hidden-import keyrings.alt \
            --icon jelper.ico \
            jelper.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --name jelper-windows `
            --hidden-import keyring.backends.Windows `
            --hidden-import keyring.backends.fail `
            --hidden-import keyrings.alt `
            --icon jelper.ico `
            jelper.py

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          iscc /DAppVersion=$version installer.iss

      - name: Upload (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: jelper-macos
          path: dist/jelper-macos

      - name: Upload (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: jelper-windows-installer.exe
          path: Output/jelper-windows-installer.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v7
        with:
          name: jelper-macos
          path: dist

      - uses: actions/download-artifact@v7
        with:
          name: jelper-windows-installer.exe
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            dist/jelper-macos
            dist/jelper-windows-installer.exe
          generate_release_notes: true

      - name: Update Homebrew formula
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOMEBREW_TAP_KEY }}" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key" git clone git@github.com:VladasZ/homebrew-tap.git
          VERSION="${{ github.ref_name }}"
          SHA256=$(sha256sum dist/jelper-macos | awk '{print $1}')
          sed -i "s|releases/download/.*/jelper-macos|releases/download/${VERSION}/jelper-macos|" homebrew-tap/Formula/jelper.rb
          sed -i "s/version \".*\"/version \"${VERSION#v}\"/" homebrew-tap/Formula/jelper.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" homebrew-tap/Formula/jelper.rb
          cd homebrew-tap
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add Formula/jelper.rb
          git commit -m "jelper ${VERSION}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key" git push
